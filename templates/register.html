{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1 style="color:#2c3e50; margin-bottom: 30px;">Register</h1>

    <div class="card">
        <form method="post">
    <input type="text" name="username" placeholder="Username" required>
    <br>
    <input type="email" name="email" placeholder="Email" required>
    <br>
    <input type="password" name="password" placeholder="Password" required>
    <br>
    <button type="submit">Register</button>
</form>
        <p style="margin-top:15px; color:#34495e;">Already have an account? <a href="/login" style="color:#27ae60;">Login</a></p>
    </div>
</div>

<style>
body {
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 50px 20px;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    width: 400px;
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

input {
    width: 80%;
    padding: 12px;
    margin: 15px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    padding: 12px 30px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2ecc71;
}
</style>
{% endblock %}
