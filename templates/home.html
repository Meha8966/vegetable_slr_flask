{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1 style="color:#2c3e50; margin-bottom: 30px;">Vegetable Market Price Prediction</h1>

    <div class="card">
        <p style="font-size:18px; color:#34495e;">Enter the feature value to predict vegetable price:</p>
        <form action="/predict" method="post">
            <input type="number" step="any" name="feature" placeholder="Enter Feature Value" required>
            <br>
            <button type="submit">Predict Price</button>
        </form>

        {% if result %}
        <div class="result">
            <strong>Predicted Price:</strong> {{ result }}
        </div>
        {% endif %}
    </div>
</div>

<style>
body {
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 50px 20px;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    width: 400px;
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

input {
    width: 80%;
    padding: 12px;
    margin: 15px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    padding: 12px 30px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2ecc71;
}

.result {
    margin-top: 20px;
    font-size: 20px;
    color: #2980b9;
}
</style>
{% endblock %}
