<!DOCTYPE html>
<html>
<head>
    <title>Vegetable Price Prediction</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f2f2f2;
            margin-top: 100px;
        }
        input {
            padding: 10px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
        }
    </style>
</head>
<body>

    <h1>Vegetable Market Price Prediction</h1>

    <form action="/predict" method="post">
        <input type="number" step="any" name="feature" placeholder="Enter Feature Value" required>
        <br><br>
        <button type="submit">Predict Price</button>
    </form>

    {% if result %}
        <div class="result">
            Predicted Price: {{ result }}
        </div>
    {% endif %}

</body>
</html>
